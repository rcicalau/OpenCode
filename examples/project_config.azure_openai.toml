[model]
timeout_seconds = 300
timeout_grace_seconds = 30

[model.roles.main]
provider = "azure_openai"
model = "openai/gpt-5.4"

[model.roles.compactor]
provider = "azure_openai"
model = "openai/gpt-5.4"

[model.roles.researcher]
provider = "azure_openai"
model_import = "ai_mart:QWEN_RESEARCH_MODEL"
temperature = 0.0
enabled = true
timeout_seconds = 120
max_context_chars = 60000

[model.providers.azure_openai]
base_url_import = "ai_mart:base_url"
auth_client = "azure_auth:AzureAuthClient"
token_method = "get_token"
model = "openai/gpt-5.4"
verify_ssl = false
auth_refresh_retries = 1
