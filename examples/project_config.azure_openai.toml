[model]
timeout_seconds = 75

[model.roles.main]
provider = "azure_openai"
model = "openai/gpt-5.4"

[model.roles.compactor]
provider = "azure_openai"
model = "openai/gpt-5.4"

[model.providers.azure_openai]
base_url_env = "AZURE_OPENAI_BASE_URL"
auth_client = "codebuddy.azure_auth:AzureAuthClient"
token_method = "get_token"
model = "openai/gpt-5.4"
verify_ssl = false
